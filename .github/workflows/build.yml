name: Rebuild registry files

on:
    push:
        branches: [ main ]
        paths:
            - 'mapping-server.yml'
            - 'scripts/cli.py'
            - 'transforms/**'
    schedule:
        - cron: "0 0 1 * *"
    workflow_dispatch:

jobs:
  build_registry:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run ETL
        run: just all

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v3
        with:
          commit-message: Update registry files
          title: 'Update all registry files'
          body: |
            Updates all registry release files using linkml-map transforms.
          assignees: matentzn
