name: Deploy to Github Pages
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run ETL to generate data
        run: just all

      - name: Prepare for deployment
        run: |
          mkdir -p gh-pages/css gh-pages/js gh-pages/data
          cp site/index.html gh-pages/
          cp site/css/style.css gh-pages/css/
          cp site/js/app.js gh-pages/js/
          cp data/mapping-specifications.json gh-pages/data/
          touch gh-pages/.nojekyll

      - name: Deploy to GitHub Pages
        if: ${{ github.event_name == 'push' }}
        uses: JamesIves/github-pages-deploy-action@v4.4.1
        with:
          branch: gh-pages
          force: true
          folder: gh-pages
